name: Generate Release Keystore

on:
  workflow_dispatch:

jobs:
  generate-keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Generate JKS keystore and verify
        run: |
          KS_PASS=$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 24)
          KEY_PASS=$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 24)
          KEY_ALIAS=floraflow-release
          # Force JKS format explicitly
          keytool -genkeypair -storetype JKS -keystore floraflow-release.jks \
            -alias "$KEY_ALIAS" -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$KS_PASS" -keypass "$KEY_PASS" \
            -dname "CN=Mathieu Delorme, OU=FloraFlow, O=FloraFlow, L=Quebec, S=Quebec, C=CA"
          # Verify the keystore can be read back
          keytool -list -keystore floraflow-release.jks -storepass "$KS_PASS" -storetype JKS
          echo "Keystore verification OK"
          KS_B64=$(base64 -w 0 floraflow-release.jks)
          mkdir -p keystore-output
          printf 'KEYSTORE_BASE64=%s\nKEYSTORE_PASSWORD=%s\nKEY_ALIAS=%s\nKEY_PASSWORD=%s\n' \
            "$KS_B64" "$KS_PASS" "$KEY_ALIAS" "$KEY_PASS" > keystore-output/secrets.txt
          echo "Done — $(wc -c < floraflow-release.jks) bytes, b64 len $(wc -c < keystore-output/secrets.txt)"
      - name: Upload credentials (1 day retention)
        uses: actions/upload-artifact@v4
        with:
          name: floraflow-keystore-secrets
          path: keystore-output/secrets.txt
          retention-days: 1
